name: CI

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run pre-commit hooks
      run: pre-commit run --all-files

  # Detect what files changed to skip unnecessary jobs
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
      notebooks: ${{ steps.filter.outputs.notebooks }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'setup.cfg'
              - 'setup.py'
              - '.pre-commit-config.yaml'
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - '*.md'
            notebooks:
              - 'notebooks/**'

  typecheck:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,visualization]"

    - name: Run type checking (mypy)
      run: mypy src/boofun --no-color-output

  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [lint, changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        exclude:
          # Reduce matrix for faster CI
          - os: macos-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.10'

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,visualization]"
        pip install psutil pytest-timeout

    - name: Run tests
      run: pytest tests/ -v --tb=short --timeout=120

    - name: Run tests with coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        pip install pytest-cov pytest-timeout ipywidgets ".[performance]"
        pytest tests/ --cov=boofun --cov-branch \
          --cov-report=xml --cov-report=term-missing --timeout=120

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  notebooks:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.notebooks == 'true' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,visualization]"
        pip install jupyter nbconvert

    - name: Validate notebooks
      run: |
        # Run key notebooks to ensure they execute without errors
        for notebook in \
          notebooks/lecture1_fourier_expansion.ipynb \
          notebooks/lecture2_linearity_testing.ipynb \
          notebooks/hw1_fourier_expansion.ipynb \
          notebooks/real_world_applications.ipynb \
          notebooks/error_models.ipynb
        do
          echo "Testing: $notebook"
          jupyter nbconvert --to notebook --execute "$notebook" \
            --ExecutePreprocessor.timeout=120 \
            --output /tmp/test_output.ipynb
        done

        # GPU notebook: validate syntax only (no GPU in CI)
        echo "Syntax-checking: notebooks/gpu_performance.ipynb"
        python -c "import json; json.load(open('notebooks/gpu_performance.ipynb'))"

  mutation:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install mutmut

    - name: Run mutation testing (core modules)
      run: |
        # Run mutation testing on critical modules only (full run too slow).
        # mutmut 3.x: paths come from [tool.mutmut] in pyproject.toml;
        # restrict to optimizations via a mutant-name pattern.
        mutmut run "src.boofun.core.optimizations*" || true
        mutmut results

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    # Only run on releases or manual trigger (not PRs - too slow)
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,performance]"
        pip install pytest-benchmark

    - name: Run benchmarks
      run: |
        python << 'EOF'
        import boofun as bf
        import time
        from boofun.analysis import SpectralAnalyzer
        from boofun.analysis.query_complexity import QueryComplexityProfile

        print('=== Boolean Function Library Benchmarks ===')
        print()

        for n in [6, 8, 10]:  # Skip n=12 (too slow for CI)
            print(f'n={n}:')

            start = time.time()
            maj = bf.majority(n)
            print(f'  Create Majority: {(time.time() - start)*1000:.2f}ms')

            start = time.time()
            analyzer = SpectralAnalyzer(maj)
            fourier = analyzer.fourier_expansion()
            print(f'  Fourier expansion: {(time.time() - start)*1000:.2f}ms')

            start = time.time()
            influences = analyzer.influences()
            print(f'  Compute influences: {(time.time() - start)*1000:.2f}ms')

            start = time.time()
            profile = QueryComplexityProfile(maj)
            profile.compute()
            print(f'  Full BFW profile: {(time.time() - start)*1000:.2f}ms')

            print()
        EOF

  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,docs]"

    - name: Build documentation
      run: |
        cd docs
        make html

    - name: Convert notebooks to HTML
      run: |
        mkdir -p docs/_build/html/notebooks
        pip install nbconvert
        # Convert all notebooks (lecture, homework, and supplementary)
        for nb in notebooks/*.ipynb; do
          jupyter nbconvert --to html "$nb" --output-dir docs/_build/html/notebooks/
        done

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4.1.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build/html
        force_orphan: true

  publish:
    needs: [test, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4

    - name: Set up Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine sigstore

    - name: Build package
      run: python -m build

    - name: Sign artifacts with Sigstore
      uses: sigstore/gh-action-sigstore-python@5b79a39c381910c090341a2c9b0bf022c8b387e1  # v3.4.0
      with:
        inputs: ./dist/*

    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        if [ -z "$TWINE_PASSWORD" ]; then
          echo "::warning::PYPI_TOKEN secret not configured, skipping publish"
          exit 0
        fi
        twine upload dist/*.whl dist/*.tar.gz
