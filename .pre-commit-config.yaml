# Pre-commit hooks for BooFun
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - formatter, import sorter, and linter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Trailing whitespace and file endings
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^conda-recipe/  # Uses Jinja2 templates
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # codespell - spell checker for code and docs
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        args: [--skip, "*.ipynb,*.json,*.csv,*.lock,_build", --ignore-words-list, "crate,nd,ot,iff,disjointness"]
        files: \.(py|md|rst|txt|yaml|yml)$

  # mypy - type checker (optional, for strict mode)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies: [numpy, types-setuptools]
        files: ^src/boofun/
        # Run but don't fail CI (many numpy/numba type issues)
        stages: [manual]

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks
  autoupdate_commit_msg: |
    [pre-commit.ci] pre-commit autoupdate
  skip: [mypy]  # Skip mypy in CI (too many existing issues)
